{% extends "blog/base.html" %}

{% block title %}登录 - 我的博客{% endblock %}

{% block content %}
<div class="post-item" style="max-width: 400px; margin: 0 auto;">
    <h2 style="text-align: center; margin-bottom: 20px;">登录</h2>
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">用户名</label>
            <input type="text" name="username" required
                   style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">密码</label>
            <input type="password" name="password" required
                   style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        </div>
        <button type="submit"
                style="width: 100%; padding: 12px; background: #2c3e50; color: #fff; border: none; border-radius: 4px; font-size: 16px; cursor: pointer;">
            登录
        </button>
    </form>
    <p style="text-align: center; margin-top: 15px; color: #999;">
        没有账号？<a href="{% url 'register' %}" style="color: #2c3e50;">去注册</a>
    </p>
</div>
{% endblock %}
