<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}我的博客{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "Segoe UI", "Noto Sans SC", sans-serif; line-height: 1.8; color: #333; background: #f5f5f5; }
        header { background: #2c3e50; color: #fff; padding: 20px 0; text-align: center; }
        header h1 { font-size: 28px; }
        header h1 a { color: #fff; text-decoration: none; }
        header p { font-size: 14px; opacity: 0.8; margin-top: 5px; }
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .post-item { background: #fff; border-radius: 8px; padding: 25px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        .post-item h2 { font-size: 22px; margin-bottom: 10px; }
        .post-item h2 a { color: #2c3e50; text-decoration: none; }
        .post-item h2 a:hover { color: #e74c3c; }
        .post-meta { font-size: 13px; color: #999; margin-bottom: 12px; }
        .post-meta span { margin-right: 15px; }
        .post-content { line-height: 1.9; }
        .post-content p { margin-bottom: 1em; }
        .footer { text-align: center; padding: 30px 0; color: #999; font-size: 13px; }
        .empty { text-align: center; padding: 60px 0; color: #999; }
    </style>
</head>
<body>
    <header>
        <h1><a href="/">我的博客</a></h1>
        <p>用 Django 写的一个小博客</p>
        <div style="margin-top: 10px;">
            {% if user.is_authenticated %}
                <span style="font-size: 14px;">{{ user.username }} 已登录</span>
                <a href="{% url 'logout' %}" style="color: #fff; font-size: 14px; margin-left: 15px;">退出</a>
            {% else %}
                <a href="{% url 'login' %}" style="color: #fff; font-size: 14px;">登录</a>
                <a href="{% url 'register' %}" style="color: #fff; font-size: 14px; margin-left: 15px;">注册</a>
            {% endif %}
        </div>
    </header>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <div class="footer">
        <p>Powered by Django 6.0</p>
    </div>
</body>
</html>
